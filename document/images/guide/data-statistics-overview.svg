<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="900" height="550" fill="#f8f9fa" rx="8"/>
  
  <!-- 标题 -->
  <text x="450" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#303133">数据统计功能概览</text>
  
  <!-- 统计维度 -->
  <rect x="30" y="70" width="840" height="100" fill="white" stroke="#dcdfe6" stroke-width="2" rx="8"/>
  <text x="450" y="100" font-size="18" font-weight="bold" fill="#303133" text-anchor="middle">统计维度</text>
  
  <!-- 维度1 -->
  <rect x="60" y="115" width="160" height="40" fill="#ecf5ff" rx="6"/>
  <text x="140" y="140" font-size="14" font-weight="bold" fill="#409eff" text-anchor="middle">📊 每日工时统计</text>
  
  <!-- 维度2 -->
  <rect x="250" y="115" width="160" height="40" fill="#f0f9eb" rx="6"/>
  <text x="330" y="140" font-size="14" font-weight="bold" fill="#67c23a" text-anchor="middle">📁 项目工时统计</text>
  
  <!-- 维度3 -->
  <rect x="440" y="115" width="160" height="40" fill="#fdf6ec" rx="6"/>
  <text x="520" y="140" font-size="14" font-weight="bold" fill="#e6a23c" text-anchor="middle">👥 人员工时统计</text>
  
  <!-- 维度4 -->
  <rect x="630" y="115" width="210" height="40" fill="#fef0f0" rx="6"/>
  <text x="735" y="140" font-size="14" font-weight="bold" fill="#f56c6c" text-anchor="middle">📈 工时类型分布统计</text>
  
  <!-- 每日工时统计图表 -->
  <rect x="30" y="190" width="410" height="340" fill="white" stroke="#409eff" stroke-width="2" rx="8"/>
  <rect x="30" y="190" width="410" height="50" fill="#409eff" rx="8"/>
  <text x="235" y="222" font-size="16" font-weight="bold" fill="white" text-anchor="middle">每日工时趋势（柱状图）</text>
  
  <!-- Y轴 -->
  <line x1="80" y1="260" x2="80" y2="480" stroke="#dcdfe6" stroke-width="2"/>
  <text x="70" y="265" font-size="10" fill="#909399" text-anchor="end">10</text>
  <text x="70" y="315" font-size="10" fill="#909399" text-anchor="end">8</text>
  <text x="70" y="365" font-size="10" fill="#909399" text-anchor="end">6</text>
  <text x="70" y="415" font-size="10" fill="#909399" text-anchor="end">4</text>
  <text x="70" y="465" font-size="10" fill="#909399" text-anchor="end">2</text>
  <text x="70" y="485" font-size="10" fill="#909399" text-anchor="end">0</text>
  
  <!-- X轴 -->
  <line x1="80" y1="480" x2="400" y2="480" stroke="#dcdfe6" stroke-width="2"/>
  <text x="110" y="500" font-size="10" fill="#909399" text-anchor="middle">01-10</text>
  <text x="160" y="500" font-size="10" fill="#909399" text-anchor="middle">01-11</text>
  <text x="210" y="500" font-size="10" fill="#909399" text-anchor="middle">01-12</text>
  <text x="260" y="500" font-size="10" fill="#909399" text-anchor="middle">01-13</text>
  <text x="310" y="500" font-size="10" fill="#909399" text-anchor="middle">01-14</text>
  <text x="360" y="500" font-size="10" fill="#909399" text-anchor="middle">01-15</text>
  
  <!-- 柱状图 -->
  <rect x="100" y="380" width="20" height="100" fill="#409eff" rx="2"/>
  <text x="110" y="375" font-size="10" fill="#409eff" text-anchor="middle">8h</text>
  
  <rect x="150" y="355" width="20" height="125" fill="#409eff" rx="2"/>
  <text x="160" y="350" font-size="10" fill="#409eff" text-anchor="middle">10h</text>
  
  <rect x="200" y="392" width="20" height="88" fill="#409eff" rx="2"/>
  <text x="210" y="387" font-size="10" fill="#409eff" text-anchor="middle">7h</text>
  
  <rect x="250" y="367" width="20" height="113" fill="#409eff" rx="2"/>
  <text x="260" y="362" font-size="10" fill="#409eff" text-anchor="middle">9h</text>
  
  <rect x="300" y="380" width="20" height="100" fill="#409eff" rx="2"/>
  <text x="310" y="375" font-size="10" fill="#409eff" text-anchor="middle">8h</text>
  
  <rect x="350" y="342" width="20" height="138" fill="#409eff" rx="2"/>
  <text x="360" y="337" font-size="10" fill="#409eff" text-anchor="middle">11h</text>
  
  <!-- 项目工时统计饼图 -->
  <rect x="460" y="190" width="410" height="340" fill="white" stroke="#67c23a" stroke-width="2" rx="8"/>
  <rect x="460" y="190" width="410" height="50" fill="#67c23a" rx="8"/>
  <text x="665" y="222" font-size="16" font-weight="bold" fill="white" text-anchor="middle">项目工时分布（饼图）</text>
  
  <!-- 饼图 -->
  <circle cx="665" cy="360" r="100" fill="none" stroke="#dcdfe6" stroke-width="1"/>
  
  <!-- 饼图扇区（简化表示） -->
  <path d="M 665 360 L 665 260 A 100 100 0 0 1 750 410 Z" fill="#409eff" opacity="0.8"/>
  <path d="M 665 360 L 750 410 A 100 100 0 0 1 580 410 Z" fill="#67c23a" opacity="0.8"/>
  <path d="M 665 360 L 580 410 A 100 100 0 0 1 665 260 Z" fill="#e6a23c" opacity="0.8"/>
  
  <!-- 图例 -->
  <rect x="500" y="480" width="15" height="15" fill="#409eff" rx="3"/>
  <text x="525" y="493" font-size="12" fill="#606266">ERP系统开发 45%</text>
  
  <rect x="650" y="480" width="15" height="15" fill="#67c23a" rx="3"/>
  <text x="675" y="493" font-size="12" fill="#606266">移动端APP 35%</text>
  
  <rect x="800" y="480" width="15" height="15" fill="#e6a23c" rx="3"/>
  <text x="825" y="493" font-size="12" fill="#606266">数据迁移 20%</text>
  
  <!-- 底部说明 -->
  <rect x="30" y="510" width="840" height="30" fill="#ecf5ff" stroke="#409eff" stroke-width="1" rx="6"/>
  <text x="450" y="530" font-size="12" fill="#409eff" text-anchor="middle">📸 需要真实截图：数据统计页面的图表展示（柱状图、饼图等）</text>
</svg>
