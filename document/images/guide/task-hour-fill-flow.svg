<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="900" height="650" fill="#f8f9fa" rx="8"/>
  
  <!-- 标题 -->
  <text x="450" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#303133">任务工时填报详细流程</text>
  
  <!-- 主流程 -->
  <circle cx="100" cy="120" r="35" fill="#e6a23c"/>
  <text x="100" y="115" font-size="24" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="100" y="135" font-size="11" fill="white" text-anchor="middle">选择</text>
  <rect x="40" y="175" width="120" height="45" fill="white" stroke="#e6a23c" stroke-width="2" rx="6"/>
  <text x="100" y="195" font-size="13" fill="#303133" text-anchor="middle">选择日期</text>
  <text x="100" y="212" font-size="11" fill="#909399" text-anchor="middle">（日历/列表）</text>
  
  <path d="M 160 120 L 220 120" stroke="#e6a23c" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <circle cx="250" cy="120" r="35" fill="#e6a23c"/>
  <text x="250" y="115" font-size="24" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="250" y="135" font-size="11" fill="white" text-anchor="middle">选择</text>
  <rect x="190" y="175" width="120" height="45" fill="white" stroke="#e6a23c" stroke-width="2" rx="6"/>
  <text x="250" y="195" font-size="13" fill="#303133" text-anchor="middle">选择项目</text>
  <text x="250" y="212" font-size="11" fill="#909399" text-anchor="middle">（下拉列表）</text>
  
  <path d="M 310 120 L 370 120" stroke="#e6a23c" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <circle cx="400" cy="120" r="35" fill="#e6a23c"/>
  <text x="400" y="115" font-size="24" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="400" y="135" font-size="11" fill="white" text-anchor="middle">选择</text>
  <rect x="340" y="175" width="120" height="45" fill="white" stroke="#e6a23c" stroke-width="2" rx="6"/>
  <text x="400" y="195" font-size="13" fill="#303133" text-anchor="middle">选择任务</text>
  <text x="400" y="212" font-size="11" fill="#909399" text-anchor="middle">（项目关联）</text>
  
  <path d="M 460 120 L 520 120" stroke="#e6a23c" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <circle cx="550" cy="120" r="35" fill="#e6a23c"/>
  <text x="550" y="115" font-size="24" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="550" y="135" font-size="11" fill="white" text-anchor="middle">选择</text>
  <rect x="490" y="175" width="120" height="45" fill="white" stroke="#e6a23c" stroke-width="2" rx="6"/>
  <text x="550" y="195" font-size="13" fill="#303133" text-anchor="middle">工作类型</text>
  <text x="550" y="212" font-size="11" fill="#909399" text-anchor="middle">（开发/测试等）</text>
  
  <path d="M 610 120 L 670 120" stroke="#e6a23c" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <circle cx="700" cy="120" r="35" fill="#e6a23c"/>
  <text x="700" y="115" font-size="24" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <text x="700" y="135" font-size="11" fill="white" text-anchor="middle">填写</text>
  <rect x="640" y="175" width="120" height="45" fill="white" stroke="#e6a23c" stroke-width="2" rx="6"/>
  <text x="700" y="195" font-size="13" fill="#303133" text-anchor="middle">填写工时</text>
  <text x="700" y="212" font-size="11" fill="#909399" text-anchor="middle">（小时数）</text>
  
  <path d="M 760 120 L 820 120" stroke="#e6a23c" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <circle cx="850" cy="120" r="35" fill="#67c23a"/>
  <text x="850" y="115" font-size="24" font-weight="bold" fill="white" text-anchor="middle">✓</text>
  <text x="850" y="135" font-size="11" fill="white" text-anchor="middle">提交</text>
  <rect x="790" y="175" width="120" height="45" fill="white" stroke="#67c23a" stroke-width="2" rx="6"/>
  <text x="850" y="200" font-size="13" fill="#303133" text-anchor="middle">保存提交</text>
  
  <!-- 工作类型详细说明 -->
  <rect x="50" y="260" width="800" height="370" fill="white" stroke="#dcdfe6" stroke-width="2" rx="8"/>
  <text x="70" y="295" font-size="18" font-weight="bold" fill="#303133">工作类型说明</text>
  <text x="70" y="320" font-size="12" fill="#909399">任务工时必须选择工作类型，用于细化工时分类统计</text>
  
  <!-- 工作类型列表 -->
  <!-- 开发 -->
  <rect x="70" y="340" width="330" height="40" fill="#ecf5ff" rx="6"/>
  <circle cx="95" cy="360" r="12" fill="#409eff"/>
  <text x="95" y="365" font-size="12" fill="white" text-anchor="middle">1</text>
  <text x="115" y="357" font-size="14" font-weight="bold" fill="#303133">开发</text>
  <text x="115" y="374" font-size="11" fill="#606266">编码、开发相关工作</text>
  <text x="350" y="365" font-size="12" fill="#909399">功能开发、Bug修复、代码重构</text>
  
  <!-- 测试 -->
  <rect x="420" y="340" width="330" height="40" fill="#ecf5ff" rx="6"/>
  <circle cx="445" cy="360" r="12" fill="#409eff"/>
  <text x="445" y="365" font-size="12" fill="white" text-anchor="middle">2</text>
  <text x="465" y="357" font-size="14" font-weight="bold" fill="#303133">测试</text>
  <text x="465" y="374" font-size="11" fill="#606266">测试、QA 相关工作</text>
  <text x="700" y="365" font-size="12" fill="#909399">功能测试、回归测试、性能测试</text>
  
  <!-- 设计 -->
  <rect x="70" y="390" width="330" height="40" fill="#f0f9eb" rx="6"/>
  <circle cx="95" cy="410" r="12" fill="#67c23a"/>
  <text x="95" y="415" font-size="12" fill="white" text-anchor="middle">3</text>
  <text x="115" y="407" font-size="14" font-weight="bold" fill="#303133">设计</text>
  <text x="115" y="424" font-size="11" fill="#606266">UI/UX 设计工作</text>
  <text x="350" y="415" font-size="12" fill="#909399">界面设计、原型设计、交互设计</text>
  
  <!-- 需求 -->
  <rect x="420" y="390" width="330" height="40" fill="#f0f9eb" rx="6"/>
  <circle cx="445" cy="410" r="12" fill="#67c23a"/>
  <text x="445" y="415" font-size="12" fill="white" text-anchor="middle">4</text>
  <text x="465" y="407" font-size="14" font-weight="bold" fill="#303133">需求</text>
  <text x="465" y="424" font-size="11" fill="#606266">需求分析、文档编写</text>
  <text x="700" y="415" font-size="12" fill="#909399">需求调研、文档撰写、方案评审</text>
  
  <!-- 部署 -->
  <rect x="70" y="440" width="330" height="40" fill="#fdf6ec" rx="6"/>
  <circle cx="95" cy="460" r="12" fill="#e6a23c"/>
  <text x="95" y="465" font-size="12" fill="white" text-anchor="middle">5</text>
  <text x="115" y="457" font-size="14" font-weight="bold" fill="#303133">部署</text>
  <text x="115" y="474" font-size="11" fill="#606266">部署、运维工作</text>
  <text x="350" y="465" font-size="12" fill="#909399">环境部署、系统维护、监控</text>
  
  <!-- 会议 -->
  <rect x="420" y="440" width="330" height="40" fill="#fdf6ec" rx="6"/>
  <circle cx="445" cy="460" r="12" fill="#e6a23c"/>
  <text x="445" y="465" font-size="12" fill="white" text-anchor="middle">6</text>
  <text x="465" y="457" font-size="14" font-weight="bold" fill="#303133">会议</text>
  <text x="465" y="474" font-size="11" fill="#606266">各类会议</text>
  <text x="700" y="465" font-size="12" fill="#909399">项目会议、技术讨论、评审会</text>
  
  <!-- 其他 -->
  <rect x="70" y="490" width="330" height="40" fill="#fef0f0" rx="6"/>
  <circle cx="95" cy="510" r="12" fill="#f56c6c"/>
  <text x="95" y="515" font-size="12" fill="white" text-anchor="middle">7</text>
  <text x="115" y="507" font-size="14" font-weight="bold" fill="#303133">其他</text>
  <text x="115" y="524" font-size="11" fill="#606266">其他类型工作</text>
  <text x="350" y="515" font-size="12" fill="#909399">不属于以上分类的工作</text>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6a23c"/>
    </marker>
  </defs>
  
  <!-- 提示 -->
  <rect x="50" y="550" width="800" height="60" fill="#ecf5ff" stroke="#409eff" stroke-width="1" rx="6"/>
  <text x="450" y="575" font-size="13" font-weight="bold" fill="#409eff" text-anchor="middle">💡 填报提示</text>
  <text x="450" y="595" font-size="12" fill="#606266" text-anchor="middle">必须先选择项目，系统才会加载该项目下的任务列表。同一日期、同一任务只能填报一次。</text>
</svg>
