<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="900" height="500" fill="#f8f9fa" rx="8"/>
  
  <!-- 标题 -->
  <text x="450" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#303133">工时审核流程</text>
  
  <!-- 左侧：待审核 -->
  <rect x="30" y="70" width="260" height="400" fill="white" stroke="#e6a23c" stroke-width="2" rx="8"/>
  <rect x="30" y="70" width="260" height="50" fill="#e6a23c" rx="8"/>
  <text x="160" y="102" font-size="18" font-weight="bold" fill="white" text-anchor="middle">待审核工时</text>
  
  <!-- 待审核列表 -->
  <rect x="50" y="140" width="220" height="60" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="65" y="165" font-size="13" font-weight="bold" fill="#303133">张三 - 2024-01-15</text>
  <text x="65" y="185" font-size="12" fill="#606266">8小时 | ERP系统开发</text>
  
  <rect x="50" y="210" width="220" height="60" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="65" y="235" font-size="13" font-weight="bold" fill="#303133">李四 - 2024-01-15</text>
  <text x="65" y="255" font-size="12" fill="#606266">7.5小时 | 移动端APP</text>
  
  <rect x="50" y="280" width="220" height="60" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="65" y="305" font-size="13" font-weight="bold" fill="#303133">王五 - 2024-01-15</text>
  <text x="65" y="325" font-size="12" fill="#606266">8小时 | 数据迁移</text>
  
  <rect x="50" y="350" width="220" height="40" fill="#f5f7fa" rx="6"/>
  <text x="160" y="375" font-size="13" fill="#909399" text-anchor="middle">... 更多记录</text>
  
  <rect x="50" y="410" width="220" height="40" fill="#e6a23c" rx="6"/>
  <text x="160" y="435" font-size="14" font-weight="bold" fill="white" text-anchor="middle">共 15 条待审核</text>
  
  <!-- 中间：审核操作 -->
  <rect x="320" y="70" width="260" height="400" fill="white" stroke="#409eff" stroke-width="2" rx="8"/>
  <rect x="320" y="70" width="260" height="50" fill="#409eff" rx="8"/>
  <text x="450" y="102" font-size="18" font-weight="bold" fill="white" text-anchor="middle">审核操作</text>
  
  <!-- 审核详情 -->
  <rect x="340" y="140" width="220" height="120" fill="#f5f7fa" rx="6"/>
  <text x="355" y="165" font-size="14" font-weight="bold" fill="#303133">工时详情</text>
  <text x="355" y="185" font-size="12" fill="#606266">填报人：张三</text>
  <text x="355" y="205" font-size="12" fill="#606266">日期：2024-01-15</text>
  <text x="355" y="225" font-size="12" fill="#606266">项目：ERP系统开发</text>
  <text x="355" y="245" font-size="12" fill="#606266">工时：8小时</text>
  
  <!-- 审核意见 -->
  <rect x="340" y="275" width="220" height="80" fill="white" stroke="#dcdfe6" stroke-width="1" rx="6"/>
  <text x="355" y="295" font-size="13" font-weight="bold" fill="#303133">审核意见</text>
  <rect x="355" y="305" width="190" height="40" fill="#f5f7fa" rx="4"/>
  <text x="365" y="330" font-size="11" fill="#c0c4cc">请输入审核意见（可选）</text>
  
  <!-- 审核按钮 -->
  <rect x="340" y="370" width="100" height="40" fill="#67c23a" rx="6"/>
  <text x="390" y="395" font-size="14" font-weight="bold" fill="white" text-anchor="middle">✓ 通过</text>
  
  <rect x="460" y="370" width="100" height="40" fill="#f56c6c" rx="6"/>
  <text x="510" y="395" font-size="14" font-weight="bold" fill="white" text-anchor="middle">✗ 驳回</text>
  
  <rect x="340" y="425" width="220" height="30" fill="#f5f7fa" rx="6"/>
  <text x="450" y="445" font-size="12" fill="#909399" text-anchor="middle">批量审核：勾选多条记录后操作</text>
  
  <!-- 右侧：已审核 -->
  <rect x="610" y="70" width="260" height="400" fill="white" stroke="#67c23a" stroke-width="2" rx="8"/>
  <rect x="610" y="70" width="260" height="50" fill="#67c23a" rx="8"/>
  <text x="740" y="102" font-size="18" font-weight="bold" fill="white" text-anchor="middle">已审核工时</text>
  
  <!-- 已通过 -->
  <rect x="630" y="140" width="220" height="60" fill="#f0f9eb" stroke="#67c23a" stroke-width="1" rx="6"/>
  <text x="645" y="165" font-size="13" font-weight="bold" fill="#303133">✓ 张三 - 2024-01-14</text>
  <text x="645" y="185" font-size="12" fill="#606266">8小时 | 已通过</text>
  
  <rect x="630" y="210" width="220" height="60" fill="#f0f9eb" stroke="#67c23a" stroke-width="1" rx="6"/>
  <text x="645" y="235" font-size="13" font-weight="bold" fill="#303133">✓ 李四 - 2024-01-14</text>
  <text x="645" y="255" font-size="12" fill="#606266">7小时 | 已通过</text>
  
  <!-- 已驳回 -->
  <rect x="630" y="280" width="220" height="60" fill="#fef0f0" stroke="#f56c6c" stroke-width="1" rx="6"/>
  <text x="645" y="305" font-size="13" font-weight="bold" fill="#303133">✗ 王五 - 2024-01-14</text>
  <text x="645" y="325" font-size="12" fill="#f56c6c">6小时 | 已驳回</text>
  <text x="645" y="340" font-size="10" fill="#909399">原因：工时记录不详细</text>
  
  <!-- 统计 -->
  <rect x="630" y="360" width="100" height="50" fill="#f0f9eb" rx="6"/>
  <text x="680" y="380" font-size="12" fill="#606266" text-anchor="middle">已通过</text>
  <text x="680" y="400" font-size="18" font-weight="bold" fill="#67c23a" text-anchor="middle">12</text>
  
  <rect x="750" y="360" width="100" height="50" fill="#fef0f0" rx="6"/>
  <text x="800" y="380" font-size="12" fill="#606266" text-anchor="middle">已驳回</text>
  <text x="800" y="400" font-size="18" font-weight="bold" fill="#f56c6c" text-anchor="middle">3</text>
  
  <rect x="630" y="425" width="220" height="30" fill="#f5f7fa" rx="6"/>
  <text x="740" y="445" font-size="12" fill="#909399" text-anchor="middle">总计：15 条已审核</text>
  
  <!-- 箭头 -->
  <path d="M 290 270 L 320 270" stroke="#409eff" stroke-width="3" marker-end="url(#arrowhead)"/>
  <path d="M 580 270 L 610 270" stroke="#67c23a" stroke-width="3" marker-end="url(#arrowhead2)"/>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#409eff"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67c23a"/>
    </marker>
  </defs>
</svg>
