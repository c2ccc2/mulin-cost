<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Arial, sans-serif">
  <!-- 背景 -->
  <rect width="900" height="600" fill="#f8f9fa" rx="8"/>
  
  <!-- 标题 -->
  <text x="450" y="40" font-size="24" font-weight="bold" text-anchor="middle" fill="#303133">工时填报流程</text>
  
  <!-- 左侧：普通工时流程 -->
  <rect x="30" y="70" width="400" height="500" fill="white" stroke="#67c23a" stroke-width="2" rx="8"/>
  <rect x="30" y="70" width="400" height="50" fill="#67c23a" rx="8"/>
  <text x="230" y="102" font-size="18" font-weight="bold" fill="white" text-anchor="middle">普通工时填报流程</text>
  
  <!-- 普通工时步骤 -->
  <circle cx="230" cy="170" r="30" fill="#67c23a"/>
  <text x="230" y="175" font-size="20" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <rect x="150" y="220" width="160" height="40" fill="#f0f9eb" stroke="#67c23a" stroke-width="1" rx="6"/>
  <text x="230" y="245" font-size="13" fill="#303133" text-anchor="middle">选择日期</text>
  
  <path d="M 230 200 L 230 220" stroke="#67c23a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <circle cx="230" cy="300" r="30" fill="#67c23a"/>
  <text x="230" y="305" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <rect x="150" y="350" width="160" height="40" fill="#f0f9eb" stroke="#67c23a" stroke-width="1" rx="6"/>
  <text x="230" y="365" font-size="13" fill="#303133" text-anchor="middle">选择项目</text>
  <text x="230" y="382" font-size="11" fill="#909399" text-anchor="middle">（不关联任务）</text>
  
  <path d="M 230 260 L 230 270" stroke="#67c23a" stroke-width="2"/>
  <path d="M 230 330 L 230 350" stroke="#67c23a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <circle cx="230" cy="430" r="30" fill="#67c23a"/>
  <text x="230" y="435" font-size="20" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <rect x="150" y="480" width="160" height="40" fill="#f0f9eb" stroke="#67c23a" stroke-width="1" rx="6"/>
  <text x="230" y="495" font-size="13" fill="#303133" text-anchor="middle">填写工时和备注</text>
  <text x="230" y="512" font-size="11" fill="#909399" text-anchor="middle">（工作记录）</text>
  
  <path d="M 230 390 L 230 400" stroke="#67c23a" stroke-width="2"/>
  <path d="M 230 460 L 230 480" stroke="#67c23a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <!-- 右侧：任务工时流程 -->
  <rect x="470" y="70" width="400" height="500" fill="white" stroke="#e6a23c" stroke-width="2" rx="8"/>
  <rect x="470" y="70" width="400" height="50" fill="#e6a23c" rx="8"/>
  <text x="670" y="102" font-size="18" font-weight="bold" fill="white" text-anchor="middle">任务工时填报流程</text>
  
  <!-- 任务工时步骤 -->
  <circle cx="670" cy="170" r="30" fill="#e6a23c"/>
  <text x="670" y="175" font-size="20" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <rect x="590" y="220" width="160" height="40" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="670" y="245" font-size="13" fill="#303133" text-anchor="middle">选择日期</text>
  
  <path d="M 670 200 L 670 220" stroke="#e6a23c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  
  <circle cx="670" cy="290" r="30" fill="#e6a23c"/>
  <text x="670" y="295" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <rect x="590" y="340" width="160" height="40" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="670" y="357" font-size="13" fill="#303133" text-anchor="middle">选择项目和任务</text>
  <text x="670" y="374" font-size="11" fill="#909399" text-anchor="middle">（关联具体任务）</text>
  
  <path d="M 670 260 L 670 260" stroke="#e6a23c" stroke-width="2"/>
  <path d="M 670 320 L 670 340" stroke="#e6a23c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  
  <circle cx="670" cy="410" r="30" fill="#e6a23c"/>
  <text x="670" y="415" font-size="20" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <rect x="590" y="460" width="160" height="40" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="670" y="477" font-size="13" fill="#303133" text-anchor="middle">选择工作类型</text>
  <text x="670" y="494" font-size="11" fill="#909399" text-anchor="middle">（开发/测试等）</text>
  
  <path d="M 670 380 L 670 380" stroke="#e6a23c" stroke-width="2"/>
  <path d="M 670 440 L 670 460" stroke="#e6a23c" stroke-width="2" marker-end="url(#arrowOrange)"/>
  
  <circle cx="670" cy="530" r="30" fill="#e6a23c"/>
  <text x="670" y="535" font-size="20" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <rect x="590" y="540" width="160" height="25" fill="#fdf6ec" stroke="#e6a23c" stroke-width="1" rx="6"/>
  <text x="670" y="557" font-size="12" fill="#303133" text-anchor="middle">填写工时</text>
  
  <path d="M 670 500 L 670 500" stroke="#e6a23c" stroke-width="2"/>
  <path d="M 670 520 L 670 530" stroke="#e6a23c" stroke-width="2"/>
  
  <!-- 箭头标记 -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#67c23a"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6a23c"/>
    </marker>
  </defs>
</svg>
